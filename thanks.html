<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Closet Creations</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <style>
        .thanks-box {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .thanks-box h1 { color: #333; margin-bottom: 20px; }
        .thanks-box p { color: #666; font-size: 1.1rem; line-height: 1.6; }
        .back-home {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="thanks-box">
        <h1>Thanks for reaching out!</h1>
        <p>We've received your custom quote request. We'll review the details and get back to you within 24 hours.</p>
        <p>In the meantime, feel free to keep browsing our creations.</p>
        <a href="index.html" class="back-home">Back to Home</a>
    </div>

</body>
</html>
